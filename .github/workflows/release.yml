name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin
          server-id: github
          settings-path: ${{ github.workspace }}
      - name: Extract version from tag
        run: echo "REVISION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
      - name: Build and test
        run: mvn clean verify -Drevision=${{ env.REVISION }}
      - name: Publish to GitHub Packages
        run: mvn deploy -Drevision=${{ env.REVISION }} -s ${{ github.workspace }}/settings.xml
        env:
          GITHUB_TOKEN: ${{ github.token }}
