name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build & verify
        run: mvn -B clean verify -Drevision=$VERSION

      - name: Package jar
        run: mvn -B package -Drevision=$VERSION

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-${{ env.VERSION }}
          path: target/*.jar
